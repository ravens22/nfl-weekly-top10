name: Weekly NFL Top10 Update

on:
  schedule:
    - cron: "0 9 * * 1"   # 毎週月曜 09:00 UTC = 18:00 JST
  workflow_dispatch: {}    # GitHub上の「Run workflow」ボタンで手動実行も可能

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build page
        run: python build.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html manifest.json *.html
          git diff --quiet --cached || git commit -m "Weekly update: $(date -u +'%Y-%m-%d')"
          git push
